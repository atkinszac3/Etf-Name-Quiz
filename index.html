<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2128;
    --border-bright: #2e3240;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-glow: rgba(0,229,160,0.3);
    --wrong: #ff4d6d;
    --wrong-dim: rgba(255,77,109,0.12);
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,229,160,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .app { width: 100%; max-width: 580px; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:36px; }
  .logo { display:flex; flex-direction:column; }
  .logo-main { font-size:13px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); }
  .logo-sub { font-size:11px; color:var(--muted); letter-spacing:0.08em; margin-top:2px; font-family:'DM Mono',monospace; }
  .stats-bar { display:flex; gap:20px; align-items:center; }
  .stat { text-align:right; }
  .stat-val { font-size:18px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }
  .stat-val.correct { color:var(--accent); }
  .stat-val.total { color:var(--muted); }
  .stat-label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }
  .divider-v { width:1px; height:28px; background:var(--border); }
  .progress-wrap { margin-bottom:32px; }
  .progress-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:0.06em; margin-bottom:8px; }
  .progress-track { height:3px; background:var(--border); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:99px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow:0 0 10px var(--accent-glow); }
  .category-badge { display:inline-flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:10px; font-family:'DM Mono',monospace; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:20px; }
  .category-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:0.7; }
  .question-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; margin-bottom:16px; position:relative; overflow:hidden; }
  .question-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent-dim),transparent); }
  .q-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:14px; }
  .q-text { font-size:21px; font-weight:700; line-height:1.3; color:var(--text); }
  .q-hint { margin-top:12px; font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; display:flex; align-items:flex-start; gap:6px; flex-wrap:wrap; line-height:1.5; }
  .hint-tag { background:var(--accent-dim); color:var(--accent); border-radius:4px; padding:2px 7px; font-size:10px; letter-spacing:0.1em; flex-shrink:0; margin-top:1px; }
  .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .option { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; cursor:pointer; transition:all 0.15s ease; text-align:left; }
  .option:hover:not(:disabled) { border-color:var(--border-bright); background:#161920; transform:translateY(-1px); }
  .option:disabled { cursor:default; }
  .option-letter { font-size:9px; font-family:'DM Mono',monospace; letter-spacing:0.12em; color:var(--muted); margin-bottom:6px; text-transform:uppercase; }
  .option-ticker { font-size:22px; font-weight:800; font-family:'DM Mono',monospace; letter-spacing:0.06em; color:var(--text); line-height:1; }
  .option.correct { border-color:var(--accent); background:var(--accent-dim); box-shadow:0 0 20px rgba(0,229,160,0.15); }
  .option.correct .option-ticker { color:var(--accent); }
  .option.correct .option-letter { color:var(--accent); opacity:0.7; }
  .option.wrong { border-color:var(--wrong); background:var(--wrong-dim); }
  .option.wrong .option-ticker { color:var(--wrong); }
  .option.reveal { border-color:var(--accent); background:var(--accent-dim); opacity:0.5; }
  .option.reveal .option-ticker { color:var(--accent); }
  .feedback { border-radius:10px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:flex-start; gap:12px; animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .feedback.correct-fb { background:var(--accent-dim); border:1px solid rgba(0,229,160,0.25); }
  .feedback.wrong-fb { background:var(--wrong-dim); border:1px solid rgba(255,77,109,0.25); }
  .fb-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
  .fb-title { font-size:13px; font-weight:700; margin-bottom:3px; }
  .feedback.correct-fb .fb-title { color:var(--accent); }
  .feedback.wrong-fb .fb-title { color:var(--wrong); }
  .fb-detail { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; line-height:1.6; }
  .btn-next { width:100%; background:var(--accent); color:#000; border:none; border-radius:10px; padding:15px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all 0.15s ease; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-next:hover { background:#00ffb3; transform:translateY(-1px); box-shadow:0 8px 24px var(--accent-glow); }
  .mode-selector { display:flex; gap:6px; margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; flex-wrap:wrap; }
  .mode-btn { flex:1; min-width:70px; background:none; border:none; border-radius:7px; padding:9px 6px; font-family:'Syne',sans-serif; font-size:10px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); cursor:pointer; transition:all 0.15s ease; text-align:center; line-height:1.4; }
  .mode-btn.active { background:var(--bg); color:var(--text); border:1px solid var(--border-bright); }
  .mode-btn .mode-count { display:block; font-size:9px; font-family:'DM Mono',monospace; color:var(--muted); margin-top:2px; letter-spacing:0.06em; }
  .mode-btn.active .mode-count { color:var(--accent); }
  .results { text-align:center; animation:fadeUp 0.4s ease; }
  .results-score { font-size:80px; font-weight:800; line-height:1; margin:8px 0; }
  .results-score.great { color:var(--accent); }
  .results-score.ok { color:var(--gold); }
  .results-score.poor { color:var(--wrong); }
  .results-label { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-family:'DM Mono',monospace; }
  .results-msg { font-size:18px; font-weight:700; margin:20px 0 8px; }
  .results-sub { font-size:13px; color:var(--muted); margin-bottom:32px; line-height:1.5; }
  .streak-badge { display:inline-flex; align-items:center; gap:6px; background:var(--gold-dim); border:1px solid rgba(245,200,66,0.3); border-radius:8px; padding:8px 16px; font-size:12px; color:var(--gold); font-family:'DM Mono',monospace; margin-bottom:28px; }
  .btn-restart { width:100%; background:none; border:1px solid var(--border-bright); color:var(--text); border-radius:10px; padding:15px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all 0.15s ease; margin-top:10px; }
  .btn-restart:hover { border-color:var(--accent); color:var(--accent); }
  .splash { text-align:center; animation:fadeUp 0.4s ease; }
  .splash-title { font-size:38px; font-weight:800; line-height:1.1; margin-bottom:12px; }
  .splash-title span { color:var(--accent); }
  .splash-sub { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:28px; max-width:400px; margin-left:auto; margin-right:auto; }
  .issuers-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:28px; }
  .issuer-chip { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 12px; font-size:11px; font-family:'DM Mono',monospace; color:var(--muted); letter-spacing:0.06em; }
  .issuer-chip span { color:var(--accent); margin-left:5px; font-size:10px; }
  .btn-start { width:100%; max-width:280px; background:var(--accent); color:#000; border:none; border-radius:10px; padding:16px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.15s ease; }
  .btn-start:hover { background:#00ffb3; box-shadow:0 8px 30px var(--accent-glow); transform:translateY(-2px); }
  .note { font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); margin-top:14px; letter-spacing:0.05em; opacity:0.7; line-height:1.6; }
  .competitors { margin-bottom:16px; animation:fadeIn 0.25s ease 0.1s both; }
  .competitors-label { font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:8px; }
  .competitors-list { display:flex; flex-direction:column; gap:6px; }
  .competitor-row { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 12px; }
  .competitor-ticker { font-family:'DM Mono',monospace; font-weight:700; font-size:14px; color:var(--text); min-width:52px; letter-spacing:0.04em; }
  .competitor-issuer { font-family:'DM Mono',monospace; font-size:9px; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; min-width:70px; }
  .competitor-name { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; line-height:1.3; flex:1; }
  .competitor-fum { font-family:'DM Mono',monospace; font-size:10px; color:var(--gold); white-space:nowrap; }
  @media (max-width:480px) { .options { grid-template-columns:1fr; } .q-text { font-size:17px; } .option-ticker { font-size:18px; } .mode-btn { min-width:50px; font-size:9px; padding:7px 4px; } .competitor-issuer { min-width:55px; } }
</style>

function getCompetitors(ticker) {
const byTicker = {};
ETFs.forEach(e => { byTicker[e.ticker] = e; });
const rivals = new Set();
for (const group of COMPETITOR_GROUPS) {
if (group.includes(ticker)) {
group.forEach(t => { if (t !== ticker) rivals.add(t); });
}
}
return Array.from(rivals)
.filter(t => byTicker[t])
.map(t => byTicker[t])
.sort((a,b) => b.fum - a.fum)
.slice(0, 4);
}

const MODES = [
{label:“All”,          sub:“all”, fn: ()=>true},
{label:“AUS Equities”, sub:“aus”, fn: e=>[“AUS Equities”,“AUS Tech”,“AUS Resources”,“AUS Financials”].includes(e.cat)},
{label:“Global”,       sub:“gbl”, fn: e=>[“Global Equities”,“US Equities”,“US Tech”,“Asia Equities”,“Asia Tech”,“EM Equities”,“Global Tech”,“Global Income”].includes(e.cat)},
{label:“Bonds & Cash”, sub:“fxi”, fn: e=>[“Fixed Income”,“Cash”].includes(e.cat)},
{label:“Thematic”,     sub:“thm”, fn: e=>[“Thematic”,“Commodities”,“AUS Property”,“Global Property”,“Multi-Asset”,“AUS ESG”,“Global ESG”,“Alternatives”].includes(e.cat)},
{label:“Top FUM”,      sub:“big”, fn: e=>e.fum>=1500},
];

const Q_COUNT = 20;
let state = {screen:‘splash’, modeIdx:0, questions:[], current:0, score:0, answered:false, selectedIdx:null, streak:0, bestStreak:0};

function shuffle(a){const b=Array.from(a);for(let i=b.length-1;i>0;i=i-1){const j=Math.floor(Math.random()*(i+1));const t=b[i];b[i]=b[j];b[j]=t;}return b;}
function pool(){return ETFs.filter(MODES[state.modeIdx].fn);}
function fumFmt(f){return f>=1000?`$${(f/1000).toFixed(1)}b`:`$${f}m`;}
function fumStars(f){if(f>=5000)return’★★★★★’;if(f>=2000)return’★★★★’;if(f>=1000)return’★★★’;if(f>=300)return’★★’;return’★’;}

function buildQuestions(){
const p=pool();
const n=Math.min(Q_COUNT,p.length);
return shuffle(p).slice(0,n).map(etf=>{
const others=shuffle(ETFs.filter(e=>e.ticker!==etf.ticker)).slice(0,3);
const opts=shuffle([etf].concat(others));
return {etf,opts,correctIdx:opts.indexOf(etf)};
});
}

function startQuiz(){
state.questions=buildQuestions();
state.current=0; state.score=0; state.answered=false; state.selectedIdx=null; state.streak=0;
state.screen=‘quiz’; render();
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true; state.selectedIdx=idx;
const q=state.questions[state.current];
if(idx===q.correctIdx){state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
else state.streak=0;
render();
}

function nextQuestion(){
if(state.current+1>=state.questions.length){state.screen=‘results’;render();return;}
state.current++;state.answered=false;state.selectedIdx=null;render();
}

function render(){
const app=document.getElementById(‘app’);
const letters=[‘A’,‘B’,‘C’,‘D’];

if(state.screen===‘splash’){
const issuers=[
{n:“Vanguard”,fum:”$77b”},{n:“BetaShares”,fum:”$52b”},{n:“iShares”,fum:”$47b”},
{n:“Dimensional”,fum:”$16b”},{n:“VanEck”,fum:”$23b”},{n:“Global X”,fum:”$10b”},
{n:“SPDR”,fum:”$12b”},{n:“Magellan”,fum:”~$2b”},{n:“Russell”,fum:”~$1b”},{n:“Perth Mint”,fum:”~$1b”},
];
app.innerHTML=`<div class="splash"> <div class="logo" style="justify-content:center;align-items:center;margin-bottom:28px;"> <div class="logo-main">ASX Ticker Quiz</div> <div class="logo-sub">ETF Edition · ${ETFs.length} funds</div> </div> <div class="splash-title">Know your<br><span>tickers.</span></div> <p class="splash-sub">Drill the ticker codes for Australia's most important ETFs — every major issuer, ranked by FUM so you always learn the ones that matter.</p> <div class="issuers-grid">${issuers.map(i=>`<div class="issuer-chip">${i.n}<span>${i.fum}</span></div>`).join('')}</div> <div class="mode-selector">${MODES.map((m,i)=>{const cnt=ETFs.filter(m.fn).length;return`<button class="mode-btn${state.modeIdx===i?' active':''}" onclick="state.modeIdx=${i};render()">${m.label}<span class="mode-count">${cnt} ETFs</span></button>`;}).join('')}</div> <p style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:20px;">${Math.min(Q_COUNT,ETFs.filter(MODES[state.modeIdx].fn).length)} questions per round</p> <button class="btn-start" onclick="startQuiz()">Start Quiz →</button> <p class="note">Data approx. Dec 2025 · ★★★★★ = $5b+ · ★★★ = $1b+ · ★ = &lt;$300m<br>Sources: Stockspot, Vanguard, BetaShares, iShares, VanEck factsheets</p> </div>`;
return;
}

if(state.screen===‘results’){
const total=state.questions.length;
const pct=Math.round((state.score/total)*100);
const cls=pct>=80?‘great’:pct>=50?‘ok’:‘poor’;
const msg=pct>=90?“You’re practically a PM at a fund.”:pct>=70?“Solid. A few more reps and you’re there.”:pct>=50?“Getting there — keep drilling.”:“Back to basics. That’s what practice is for.”;
app.innerHTML=`<div class="results"> <div class="logo-main" style="margin-bottom:24px;">ASX Ticker Quiz</div> <div class="results-label">Your score</div> <div class="results-score ${cls}">${state.score}/${total}</div> <div class="results-label">${pct}%</div> <div class="results-msg">${msg}</div> <p class="results-sub">Mode: ${MODES[state.modeIdx].label} · ${state.score} correct of ${total}</p> ${state.bestStreak>=3?`<div class="streak-badge">🔥 Best streak: ${state.bestStreak} in a row</div>`:''} <button class="btn-next" onclick="startQuiz()">Play Again →</button> <button class="btn-restart" onclick="state.screen='splash';render()">↩ Change Mode</button> </div>`;
return;
}

const q=state.questions[state.current];
const total=state.questions.length;
const pct=(state.current/total)*100;
const optHTML=q.opts.map((opt,idx)=>{
let cls=‘option’;
if(state.answered){if(idx===q.correctIdx)cls+=state.selectedIdx===idx?’ correct’:’ reveal’;else if(idx===state.selectedIdx)cls+=’ wrong’;}
return`<button class="${cls}" onclick="handleAnswer(${idx})" ${state.answered?'disabled':''}><div class="option-letter">${letters[idx]}</div><div class="option-ticker">${opt.ticker}</div></button>`;
}).join(’’);

const rivals = state.answered ? getCompetitors(q.etf.ticker) : [];
const rivalsHTML = rivals.length > 0 ? ` <div class="competitors"> <div class="competitors-label">Also in this space</div> <div class="competitors-list"> ${rivals.map(r=>`<div class="competitor-row">
<span class="competitor-ticker">${r.ticker}</span>
<span class="competitor-issuer">${r.issuer}</span>
<span class="competitor-name">${r.name}</span>
<span class="competitor-fum">${fumFmt(r.fum)}</span>
</div>`).join('')} </div> </div>` : ‘’;

const fbHTML=state.answered?`<div class="feedback ${state.selectedIdx===q.correctIdx?'correct-fb':'wrong-fb'}"> <div class="fb-icon">${state.selectedIdx===q.correctIdx?'✓':'✗'}</div> <div class="fb-content"> <div class="fb-title">${state.selectedIdx===q.correctIdx?`Correct! ${q.etf.ticker}`:`The answer was ${q.etf.ticker}`}</div>
<div class="fb-detail">${q.etf.issuer} · ${q.etf.name}<br>${q.etf.hint}<br><span style="color:var(--gold)">FUM ${fumFmt(q.etf.fum)} ${fumStars(q.etf.fum)}</span></div>
</div>

  </div>`:'';

app.innerHTML=`<div> <div class="header"> <div class="logo"> <div class="logo-main">ASX Ticker Quiz</div> <div class="logo-sub">${MODES[state.modeIdx].label} · ETF Edition</div> </div> <div class="stats-bar"> <div class="stat"><div class="stat-val correct">${state.score}</div><div class="stat-label">Correct</div></div> <div class="divider-v"></div> <div class="stat"><div class="stat-val total">${state.current}</div><div class="stat-label">Done</div></div> ${state.streak>=2?`<div class="divider-v"></div><div class="stat"><div class="stat-val" style="color:var(--gold)">🔥${state.streak}</div><div class="stat-label">Streak</div></div>`:''} </div> </div> <div class="progress-wrap"> <div class="progress-meta"><span>Question ${state.current+1} of ${total}</span><span>${Math.round(pct)}%</span></div> <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div> </div> <div class="category-badge"><div class="category-dot"></div>${q.etf.cat} · ${q.etf.issuer}<span style="margin-left:6px;color:var(--gold)">${fumFmt(q.etf.fum)}</span></div> <div class="question-card"> <div class="q-label">What is the ASX ticker for this ETF?</div> <div class="q-text">${q.etf.name}</div> <div class="q-hint"><span class="hint-tag">Hint</span>${q.etf.hint}</div> </div> <div class="options">${optHTML}</div> ${fbHTML} ${rivalsHTML} ${state.answered?`<button class="btn-next" onclick="nextQuestion()">${state.current+1>=total?‘See Results’:‘Next Question’} →</button>`:’’}

  </div>`;
}
render();
</script>
